<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HS Courses — Gestion des Colis</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f8f9fb;
  --border: #e2e6ed;
  --ink: #1a1d23;
  --ink2: #6b7280;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --blue-mid: #93c5fd;
  --accent: #f59e0b;
  --green: #059669;
  --green-light: #d1fae5;
  --red: #dc2626;
  --red-light: #fee2e2;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Epilogue', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.5; }

/* ── LOADER ── */
#loader { position: fixed; inset: 0; background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999; }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loader p { color: rgba(255,255,255,0.4); font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; }

/* ── LOGIN ── */
#login-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 24px; background: var(--ink); position: relative; overflow: hidden; }
#login-screen.visible { display: flex; }
#login-screen::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%); top: -200px; right: -200px; pointer-events: none; }
#login-screen::after { content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%); bottom: -100px; left: -100px; pointer-events: none; }
.login-box { width: 100%; max-width: 400px; position: relative; z-index: 1; }
.login-brand { text-align: center; margin-bottom: 40px; }
.login-brand h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: #fff; letter-spacing: -1px; }
.login-brand h1 span { color: var(--blue); }
.login-brand p { color: rgba(255,255,255,0.35); font-size: 13px; margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }
.login-card { background: var(--surface); border-radius: 20px; padding: 36px 32px; box-shadow: var(--shadow-lg); }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink2); margin-bottom: 7px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'Epilogue', sans-serif; font-size: 15px; color: var(--ink); background: var(--surface);
  transition: border-color 0.2s, box-shadow 0.2s; outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.error-box { background: var(--red-light); color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 18px; display: none; }
.error-box.show { display: block; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: var(--radius-sm); font-family: 'Epilogue', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; white-space: nowrap; }
.btn-primary { background: var(--blue); color: #fff; width: 100%; padding: 14px; font-size: 15px; }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary { background: var(--surface2); color: var(--ink); border: 1.5px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1.5px solid #fca5a5; }
.btn-danger:hover { background: #fecaca; }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { background: #047857; }
.btn-sm { padding: 7px 12px; font-size: 13px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
.link-btn { background: none; border: none; color: var(--blue); font-size: 13px; cursor: pointer; font-family: 'Epilogue', sans-serif; text-decoration: underline; padding: 0; }

/* ── APP SHELL ── */
#app { display: none; flex-direction: column; min-height: 100vh; }
#app.visible { display: flex; }

.app-nav { background: var(--ink); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.nav-brand { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.nav-brand span { color: var(--blue); }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-user { color: rgba(255,255,255,0.6); font-size: 13px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-logout { background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: 'Epilogue', sans-serif; transition: all 0.2s; }
.nav-logout:hover { background: rgba(255,255,255,0.1); color: #fff; }

.app-body { flex: 1; padding: 24px 16px; max-width: 900px; margin: 0 auto; width: 100%; }

/* ── TIME BANNER ── */
.time-banner { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; margin-bottom: 20px; }
.time-banner.open { background: var(--green-light); color: var(--green); }
.time-banner.closed { background: var(--red-light); color: var(--red); }
.time-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.time-banner.open .time-dot { background: var(--green); }
.time-banner.closed .time-dot { background: var(--red); }

/* ── PAGE HEADER ── */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; }
.page-actions { display: flex; gap: 10px; flex-wrap: wrap; }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 4px; margin-bottom: 24px; box-shadow: var(--shadow-sm); overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 9px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; border: none; background: transparent; color: var(--ink2); transition: all 0.18s; font-family: 'Epilogue', sans-serif; }
.tab.active { background: var(--blue); color: #fff; font-weight: 600; box-shadow: var(--shadow-sm); }
.tab:hover:not(.active) { background: var(--bg); color: var(--ink); }

/* ── RECIPIENTS TABLE ── */
.recipients-table { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; border: 1px solid var(--border); }
.table-header { display: grid; grid-template-columns: 1fr 80px 48px; gap: 0; background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 16px; }
.th { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink2); }
.recipient-row { display: grid; grid-template-columns: 1fr 80px 48px; gap: 0; padding: 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; align-items: center; user-select: none; position: relative; }
.recipient-row:last-child { border-bottom: none; }
.recipient-row:hover { background: var(--surface2); }
.recipient-row.selected { background: var(--blue-light); }
.recipient-row.selected:hover { background: #bfdbfe; }
.row-main { padding: 14px 16px; }
.row-name { font-weight: 600; font-size: 15px; color: var(--ink); }
.row-sub { font-size: 12px; color: var(--ink2); margin-top: 2px; }
.row-qty { padding: 14px 8px; text-align: center; }
.qty-badge { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; font-weight: 700; font-size: 16px; background: var(--border); color: var(--ink2); transition: all 0.2s; }
.selected .qty-badge { background: var(--blue); color: #fff; }
.row-expand { padding: 14px 12px; display: flex; align-items: center; justify-content: center; }
.expand-icon { font-size: 18px; color: var(--ink2); transition: transform 0.2s; }
.recipient-row.expanded .expand-icon { transform: rotate(180deg); }

/* ── ROW DETAIL (expanded) ── */
.row-detail { padding: 16px; background: #f0f6ff; border-bottom: 1px solid var(--border); display: none; }
.row-detail.open { display: block; }
.detail-grid { display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: center; }
.detail-label { font-size: 12px; font-weight: 600; color: var(--ink2); letter-spacing: 0.5px; white-space: nowrap; }
.qty-controls { display: flex; align-items: center; gap: 10px; }
.qty-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); font-size: 20px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); transition: all 0.15s; }
.qty-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
.qty-input { width: 64px; text-align: center; padding: 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 18px; font-weight: 700; font-family: 'Epilogue', sans-serif; color: var(--ink); background: var(--surface); outline: none; }
.qty-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
.comment-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Epilogue', sans-serif; font-size: 14px; color: var(--ink); background: var(--surface); resize: none; min-height: 72px; outline: none; }
.comment-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
.detail-save { margin-top: 12px; display: flex; justify-content: flex-end; }

/* ── CARDS ── */
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
.card-body { padding: 20px; }

/* ── ADMIN ORDER LIST ── */
.order-group { margin-bottom: 20px; }
.order-group-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.order-group-count { background: var(--blue); color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
.order-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
.order-item:last-child { border-bottom: none; }
.order-recipient { font-weight: 600; font-size: 14px; }
.order-comment { font-size: 12px; color: var(--ink2); margin-top: 2px; }
.order-qty { background: var(--ink); color: #fff; font-weight: 700; font-size: 14px; padding: 4px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }

/* ── STATS BAR ── */
.stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-box { background: var(--surface); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); text-align: center; }
.stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--blue); line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 11px; color: var(--ink2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── MANAGE TABLE ── */
.manage-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.manage-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink2); background: var(--surface2); border-bottom: 1px solid var(--border); }
.manage-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.manage-table tr:last-child td { border-bottom: none; }
.manage-table tr:hover td { background: var(--surface2); }

/* ── HISTORY ── */
.history-month-select { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.history-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.history-table th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink2); background: var(--surface2); border-bottom: 2px solid var(--border); }
.history-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); }
.history-table tr:hover td { background: var(--surface2); }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; justify-content: center; padding: 0; backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
@media (min-width: 640px) { .modal-overlay { align-items: center; padding: 24px; } }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 28px 24px 36px; animation: slideUp 0.25s ease; }
@media (min-width: 640px) { .modal { border-radius: 16px; } }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
.modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

/* ── ASSIGNMENT GRID ── */
.assign-grid { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
.assign-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s; }
.assign-item:hover { border-color: var(--blue); background: var(--blue-light); }
.assign-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--blue); cursor: pointer; flex-shrink: 0; }
.assign-item label { cursor: pointer; font-size: 14px; font-weight: 500; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 500; z-index: 9998; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-lg); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 48px 24px; color: var(--ink2); }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty p { font-size: 15px; }

/* ── BADGE ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-green { background: var(--green-light); color: var(--green); }

/* ── RESPONSIVE ── */
@media (min-width: 640px) {
  .app-body { padding: 32px 24px; }
  .table-header { grid-template-columns: 1fr 100px 48px; }
  .recipient-row { grid-template-columns: 1fr 100px 48px; }
}
@media (min-width: 900px) {
  .app-body { padding: 40px 32px; }
}
</style>
</head>

<script>
// ── STATE ─────────────────────────────────────────────────
let currentUser = null;
let adminToken = null;
let isWindowOpen = false;
let recipientOrders = {}; // recipient_id -> { qty, comment }
let activeAdminTab = 'orders';

// ── API ───────────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (adminToken) headers['x-admin-token'] = adminToken;
  if (currentUser && currentUser.id) headers['x-client-id'] = currentUser.id;
  const res = await fetch('/api/' + path, {
    method: opts.method || 'GET',
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erreur serveur');
  return data;
}

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('load', async () => {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('login-screen').classList.add('visible');
  document.getElementById('login-pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

// ── AUTH ──────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    const user = await api('auth/login', { method: 'POST', body: { email, password: pwd } });
    currentUser = user;
    if (user.role === 'admin') adminToken = 'admin-ok';
    document.getElementById('login-screen').classList.remove('visible');
    document.getElementById('app').classList.add('visible');
    document.getElementById('nav-user').textContent = user.name;
    if (user.role === 'admin') {
      document.getElementById('admin-view').style.display = 'block';
      renderAdminOrders();
    } else {
      document.getElementById('client-view').style.display = 'block';
      document.getElementById('nav-changepwd-btn').style.display = '';
      await initClientView();
    }
  } catch(e) {
    errEl.textContent = e.message === 'Identifiants incorrects' ? 'Identifiants incorrects.' : e.message.includes('bloqué') ? e.message : 'Erreur de connexion.';
    errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}

function doLogout() {
  currentUser = null; adminToken = null; recipientOrders = {};
  document.getElementById('app').classList.remove('visible');
  document.getElementById('admin-view').style.display = 'none';
  document.getElementById('client-view').style.display = 'none';
  document.getElementById('login-screen').classList.add('visible');
  document.getElementById('login-email').value = '';
  document.getElementById('login-pwd').value = '';
}

// ── CHANGE PASSWORD MODAL ─────────────────────────────────
function showChangePwdModal() {
  const email = document.getElementById('login-email').value.trim();
  openModal('Modifier mon mot de passe', `
    <div class="form-group"><label>Identifiant ou e-mail</label><input type="text" id="cp-email" value="${email}" placeholder="Identifiant ou e-mail"></div>
    <div class="form-group"><label>Ancien mot de passe</label><input type="password" id="cp-old" placeholder="••••••••"></div>
    <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="cp-new" placeholder="••••••••"></div>
  `, [
    { label: 'Annuler', cls: 'btn-secondary', action: closeModal },
    { label: 'Modifier', cls: 'btn-primary', action: async () => {
      const em = document.getElementById('cp-email').value.trim();
      const oldP = document.getElementById('cp-old').value;
      const newP = document.getElementById('cp-new').value;
      if (!newP || newP.length < 3) { toast('⚠️ Mot de passe trop court'); return; }
      try {
        await api('auth/change-password', { method: 'POST', body: { email: em, oldPassword: oldP, newPassword: newP } });
        closeModal(); toast('✓ Mot de passe modifié');
      } catch(e) { toast('❌ ' + e.message); }
    }}
  ]);
}

function showClientChangePwdModal() {
  openModal('Modifier mon mot de passe', `
    <div class="form-group"><label>Ancien mot de passe</label><input type="password" id="ccp-old" placeholder="••••••••"></div>
    <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="ccp-new" placeholder="••••••••"></div>
    <div class="form-group"><label>Confirmer le nouveau mot de passe</label><input type="password" id="ccp-confirm" placeholder="••••••••"></div>
  `, [
    { label: 'Annuler', cls: 'btn-secondary', action: closeModal },
    { label: 'Modifier', cls: 'btn-primary', action: async () => {
      const oldP = document.getElementById('ccp-old').value;
      const newP = document.getElementById('ccp-new').value;
      const confirm = document.getElementById('ccp-confirm').value;
      if (!newP || newP.length < 3) { toast('⚠️ Mot de passe trop court (min 3 caractères)'); return; }
      if (newP !== confirm) { toast('⚠️ Les mots de passe ne correspondent pas'); return; }
      try {
        await api('auth/change-password', { method: 'POST', body: { email: currentUser.email, oldPassword: oldP, newPassword: newP } });
        closeModal(); toast('✓ Mot de passe modifié');
      } catch(e) { toast('❌ ' + e.message); }
    }}
  ]);
}

// ── CLIENT VIEW ───────────────────────────────────────────
async function initClientView() {
  const cfg = await api('config');
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;
  const start = parseFloat(cfg.start_hour);
  const end = parseFloat(cfg.end_hour);
  isWindowOpen = h >= start && h < end;
  const banner = document.getElementById('time-banner');
  const bannerText = document.getElementById('time-banner-text');
  if (isWindowOpen) {
    banner.className = 'time-banner open';
    bannerText.textContent = `Saisie ouverte jusqu'à ${cfg.end_hour}h00`;
  } else {
    banner.className = 'time-banner closed';
    bannerText.textContent = `Saisie fermée — disponible de ${cfg.start_hour}h00 à ${cfg.end_hour}h00`;
  }
  await renderClientRecipients();
}

async function renderClientRecipients() {
  const container = document.getElementById('recipients-container');
  container.innerHTML = '<div class="empty"><div class="spinner" style="margin:0 auto 16px;"></div><p>Chargement…</p></div>';
  try {
    const [recipients, orders] = await Promise.all([
      api('clients/' + currentUser.id + '/recipients'),
      api('orders/client/' + currentUser.id)
    ]);
    recipientOrders = {};
    orders.forEach(o => { recipientOrders[o.recipient_id] = { qty: o.quantity, comment: o.comment || '' }; });

    if (recipients.length === 0) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Aucun destinataire assigné.<br>Cliquez sur « Ajouter » pour en créer un.</p></div>';
      return;
    }

    const table = document.createElement('div');
    table.className = 'recipients-table';
    table.innerHTML = `<div class="table-header"><div class="th">Destinataire</div><div class="th" style="text-align:center;">Colis</div><div class="th"></div></div>`;

    recipients.forEach(r => {
      const o = recipientOrders[r.id] || { qty: 0, comment: '' };
      const isSelected = o.qty > 0;
      const rowId = 'row-' + r.id.replace(/-/g, '');

      const rowEl = document.createElement('div');
      rowEl.className = 'recipient-row' + (isSelected ? ' selected' : '');
      rowEl.id = rowId;
      rowEl.dataset.recipientId = r.id;

      rowEl.innerHTML = `
        <div class="row-main">
          <div class="row-name">${r.name}</div>
          ${r.address || r.phone ? '<div class="row-sub">' + [r.address, r.phone].filter(Boolean).join(' · ') + '</div>' : ''}
        </div>
        <div class="row-qty">
          <div class="qty-badge" id="badge-${r.id.replace(/-/g,'')}">${o.qty || 0}</div>
        </div>
        <div class="row-expand"><span class="expand-icon">⌄</span></div>`;

      const detailEl = document.createElement('div');
      detailEl.className = 'row-detail';
      detailEl.id = 'detail-' + r.id.replace(/-/g, '');
      detailEl.innerHTML = `
        <div class="detail-grid">
          <div class="detail-label">Quantité</div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="adjustQty('${r.id}', -1)">−</button>
            <input type="number" class="qty-input" id="qty-${r.id.replace(/-/g,'')}" value="${o.qty || 0}" min="0" max="999" onchange="setQtyInput('${r.id}', this.value)">
            <button class="qty-btn" onclick="adjustQty('${r.id}', 1)">+</button>
          </div>
          <div class="detail-label">Commentaire</div>
          <textarea class="comment-input" id="comment-${r.id.replace(/-/g,'')}" placeholder="Informations complémentaires…" onchange="setComment('${r.id}', this.value)">${o.comment || ''}</textarea>
        </div>
`;

      // Single click = select/deselect
      let clickTimer = null;
      rowEl.addEventListener('click', (e) => {
        if (e.target.closest('.row-expand') || e.target.closest('.row-detail') || e.target.closest('.qty-btn') || e.target.closest('.qty-input') || e.target.closest('.comment-input') || e.target.closest('.detail-save')) return;
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
        clickTimer = setTimeout(() => {
          clickTimer = null;
          if (!isWindowOpen) { toast('⚠️ La saisie est fermée pour le moment'); return; }
          toggleSelect(r.id);
        }, 400);
      });

      // Double click = expand detail
      rowEl.addEventListener('dblclick', (e) => {
        if (e.target.closest('.row-expand') || e.target.closest('.row-detail')) return;
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
        if (!isWindowOpen) { toast('⚠️ La saisie est fermée pour le moment'); return; }
        toggleDetail(r.id);
      });

      // Expand icon click
      rowEl.querySelector('.row-expand').addEventListener('click', (e) => {
        e.stopPropagation();
        if (!isWindowOpen) { toast('⚠️ La saisie est fermée pour le moment'); return; }
        toggleDetail(r.id);
      });

      table.appendChild(rowEl);
      table.appendChild(detailEl);
    });
    container.innerHTML = '';
    container.appendChild(table);
  } catch(e) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Erreur : ' + e.message + '</p></div>';
  }
}

function toggleSelect(recipientId) {
  const key = recipientId.replace(/-/g, '');
  const rowEl = document.getElementById('row-' + key);
  const badge = document.getElementById('badge-' + key);
  const qtyInput = document.getElementById('qty-' + key);
  if (!recipientOrders[recipientId]) recipientOrders[recipientId] = { qty: 0, comment: '' };
  const o = recipientOrders[recipientId];
  if (o.qty > 0) {
    o.qty = 0;
    rowEl.classList.remove('selected');
    badge.textContent = '0';
    if (qtyInput) qtyInput.value = '0';
  } else {
    o.qty = 1;
    rowEl.classList.add('selected');
    badge.textContent = '1';
    if (qtyInput) qtyInput.value = '1';
  }
  saveOrder(recipientId, true);
}

function toggleDetail(recipientId) {
  const key = recipientId.replace(/-/g, '');
  const rowEl = document.getElementById('row-' + key);
  const detailEl = document.getElementById('detail-' + key);
  const isOpen = detailEl.classList.contains('open');
  // Close all others
  document.querySelectorAll('.row-detail.open').forEach(d => { d.classList.remove('open'); d.previousElementSibling.classList.remove('expanded'); });
  if (!isOpen) { detailEl.classList.add('open'); rowEl.classList.add('expanded'); }
}

function adjustQty(recipientId, delta) {
  const key = recipientId.replace(/-/g, '');
  if (!recipientOrders[recipientId]) recipientOrders[recipientId] = { qty: 0, comment: '' };
  const o = recipientOrders[recipientId];
  o.qty = Math.max(0, (o.qty || 0) + delta);
  document.getElementById('qty-' + key).value = o.qty;
  document.getElementById('badge-' + key).textContent = o.qty;
  const rowEl = document.getElementById('row-' + key);
  if (o.qty > 0) rowEl.classList.add('selected'); else rowEl.classList.remove('selected');
  saveOrder(recipientId, true);
}

function setQtyInput(recipientId, val) {
  const key = recipientId.replace(/-/g, '');
  if (!recipientOrders[recipientId]) recipientOrders[recipientId] = { qty: 0, comment: '' };
  const o = recipientOrders[recipientId];
  o.qty = Math.max(0, parseInt(val) || 0);
  document.getElementById('badge-' + key).textContent = o.qty;
  const rowEl = document.getElementById('row-' + key);
  if (o.qty > 0) rowEl.classList.add('selected'); else rowEl.classList.remove('selected');
  saveOrder(recipientId, true);
}

function setComment(recipientId, val) {
  if (!recipientOrders[recipientId]) recipientOrders[recipientId] = { qty: 0, comment: '' };
  recipientOrders[recipientId].comment = val;
  saveOrder(recipientId, true);
}

async function saveOrder(recipientId, silent = false) {
  const o = recipientOrders[recipientId] || { qty: 0, comment: '' };
  try {
    await api('orders', { method: 'POST', body: {
      client_id: currentUser.id,
      recipient_id: recipientId,
      quantity: parseInt(o.qty) || 0,
      comment: o.comment || ''
    }});
    if (!silent) toast('✓ Enregistré');
  } catch(e) { toast('❌ ' + e.message); }
}

async function exportHistoryMonth(month) {
  try {
    const rows = await api('history/' + month);
    if (rows.length === 0) { toast('⚠️ Aucune donnée à exporter'); return; }

    // Get all unique recipients for this month
    const allRecipients = [...new Set(rows.map(r => r.recipient_name))].sort();

    // Build one row per client
    const byClient = {};
    rows.forEach(r => {
      if (!byClient[r.client_name]) {
        byClient[r.client_name] = { address: r.client_address || '', totalQty: 0, recipients: {} };
      }
      byClient[r.client_name].totalQty += parseInt(r.quantity) || 0;
      byClient[r.client_name].recipients[r.recipient_name] = r.quantity;
    });

    const maxRecip = Math.max(...Object.values(byClient).map(c => Object.keys(c.recipients).length));
    const recipHeaders = Array.from({ length: maxRecip }, (_, i) => i === 0 ? 'Fournisseurs' : '');
    const header = ['Client', 'Ville', 'Nb de passage', ...recipHeaders];
    const csvRows = [header];
    Object.entries(byClient).sort((a,b) => a[0].localeCompare(b[0])).forEach(([clientName, info]) => {
      const recipNames = Object.entries(info.recipients)
        .sort((a,b) => a[0].localeCompare(b[0]))
        .map(([name]) => name);
      while (recipNames.length < maxRecip) recipNames.push('');
      csvRows.push([clientName, info.address, info.totalQty, ...recipNames]);
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(csvRows);
    ws['!cols'] = csvRows[0].map((_, ci) => ({ wch: Math.max(...csvRows.map(r => String(r[ci] || '').length), 10) }));
    XLSX.utils.book_append_sheet(wb, ws, 'Historique');
    XLSX.writeFile(wb, 'historique_' + month + '.xlsx');
    toast('✓ Export téléchargé');
  } catch(e) { toast('❌ ' + e.message); }
}

async function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;

  // Read file with SheetJS
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      if (rows.length < 2) { toast('⚠️ Fichier vide ou sans données'); return; }

      // Detect header row — find Nom and Email columns (case-insensitive)
      const headers = rows[0].map(h => String(h).trim().toLowerCase());
      const nomIdx = headers.findIndex(h => h.includes('nom') || h === 'name');
      const emailIdx = headers.findIndex(h => h.includes('email') || h.includes('mail'));

      if (nomIdx === -1 || emailIdx === -1) {
        toast('⚠️ Colonnes "Nom" et "Email" introuvables dans le fichier');
        return;
      }

      const clients = rows.slice(1)
        .filter(r => r[nomIdx] || r[emailIdx])
        .map(r => ({ name: String(r[nomIdx] || '').trim(), email: String(r[emailIdx] || '').trim() }))
        .filter(c => c.name && c.email);

      if (clients.length === 0) { toast('⚠️ Aucune ligne valide trouvée'); return; }

      // Show confirmation modal
      openModal('Confirmer l\'import', `
        <p style="margin-bottom:12px;">Fichier détecté : <strong>${file.name}</strong></p>
        <p style="margin-bottom:12px;"><strong>${clients.length} client${clients.length > 1 ? 's' : ''}</strong> trouvé${clients.length > 1 ? 's' : ''}.</p>
        <div style="background:var(--red-light);color:var(--red);padding:12px;border-radius:var(--radius-sm);font-size:13px;">
          ⚠️ Cette action remplacera <strong>tous les clients existants</strong> ainsi que leurs commandes, historique et assignations.
        </div>
        <div style="margin-top:12px;max-height:180px;overflow-y:auto;background:var(--surface2);border-radius:var(--radius-sm);padding:8px 12px;">
          ${clients.slice(0, 20).map(c => `<div style="font-size:13px;padding:3px 0;border-bottom:1px solid var(--border);">${c.name} — ${c.email}</div>`).join('')}
          ${clients.length > 20 ? `<div style="font-size:12px;color:var(--ink2);padding:6px 0;">… et ${clients.length - 20} autres</div>` : ''}
        </div>
      `, [
        { label: 'Annuler', cls: 'btn-secondary', action: closeModal },
        { label: 'Importer', cls: 'btn-danger', action: async () => {
          closeModal();
          toast('⏳ Import en cours…');
          try {
            const result = await api('clients/import', { method: 'POST', body: { clients } });
            renderAdminClients();
            if (result.errors && result.errors.length > 0) {
              openModal(
                `Import terminé — ${result.created} importé${result.created > 1 ? 's' : ''}, ${result.errors.length} erreur${result.errors.length > 1 ? 's' : ''}`,
                `<p style="margin-bottom:12px;">✓ <strong>${result.created} client${result.created > 1 ? 's' : ''}</strong> importé${result.created > 1 ? 's' : ''} avec succès.</p>
                <p style="margin-bottom:8px;color:var(--red);font-weight:600;">❌ ${result.errors.length} erreur${result.errors.length > 1 ? 's' : ''} :</p>
                <div style="max-height:200px;overflow-y:auto;background:var(--red-light);border-radius:var(--radius-sm);padding:10px 12px;">
                  ${result.errors.map(e => `<div style="font-size:13px;padding:3px 0;border-bottom:1px solid rgba(220,38,38,0.15);">${e}</div>`).join('')}
                </div>`,
                [{ label: 'Fermer', cls: 'btn-primary', action: closeModal }]
              );
            } else {
              toast(`✓ ${result.created} client${result.created > 1 ? 's' : ''} importé${result.created > 1 ? 's' : ''} avec succès`);
            }
          } catch(err) { toast('❌ ' + err.message); }
        }}
      ]);
    } catch(err) {
      toast('❌ Erreur lecture fichier : ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

async function renderRouteSheets() {
  const el = document.getElementById('tab-routes');
  el.innerHTML = '<div class="empty"><div class="spinner" style="margin:0 auto;"></div></div>';
  try {
    const [sheets, clients, allRecipients] = await Promise.all([
      api('route-sheets'), api('clients'), api('recipients')
    ]);
    let html = `<div style="margin-bottom:16px;display:flex;justify-content:flex-end;">
      <button class="btn btn-primary btn-sm" onclick="showAddRouteSheetModal()">+ Nouvelle feuille de route</button>

      html += '<div class="empty"><div class="empty-icon">🗺️</div><p>Aucune feuille de route.<br>Créez-en une pour segmenter vos exports.</p></div>';
    } else {
      sheets.forEach(sheet => {
        const unassigned = clients.filter(c => !sheet.clients.find(sc => sc.id === c.id));
        html += `<div class="card" style="margin-bottom:20px;">
          <div class="card-header">
            <div class="card-title">🗺️ ${sheet.name}</div>
            <div style="display:flex;gap:8px;">

          </div>

        if (sheet.clients.length === 0) {
          html += '<p style="font-size:13px;color:var(--ink2);font-style:italic;padding:16px;">Aucun client assigné</p>';
        } else {
          sheet.clients.forEach(c => {
            const assignedRecipIds = c.recipients.map(r => r.id);
            // Recipients not yet assigned to this client in this sheet
            // (only from clients that are recipients = all recipients)
            const unassignedRecips = allRecipients.filter(r =>
              r.client_id !== c.id && !assignedRecipIds.includes(r.id)
            );
            html += `<div style="border-bottom:1px solid var(--border);padding:14px 16px;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <div style="font-weight:700;font-size:15px;color:var(--ink);">📦 ${c.name}</div>
                <button onclick="removeClientFromSheet('${sheet.id}','${c.id}')"
                  style="background:none;border:none;cursor:pointer;color:var(--red);font-size:13px;font-family:'Epilogue',sans-serif;">
                  Retirer
                </button>
              </div>
              <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;">
                Destinataires filtrés ${c.recipients.length > 0 ? '(' + c.recipients.length + ')' : '<span style="font-weight:400;text-transform:none;letter-spacing:0;">— tous si vide</span>'}
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
                ${c.recipients.map(r => `
                  <div style="display:inline-flex;align-items:center;gap:6px;background:var(--blue-light);color:var(--blue);padding:4px 10px;border-radius:20px;font-size:13px;font-weight:500;">
                    ${r.name}
                    <button onclick="removeRecipientFromSheetClient('${sheet.id}','${c.id}','${r.id}')"
                      style="background:none;border:none;cursor:pointer;color:var(--blue);font-size:16px;line-height:1;padding:0;">×</button>
                  </div>`).join('')}
                ${c.recipients.length === 0 ? '<span style="font-size:12px;color:var(--ink2);font-style:italic;">Tous les destinataires inclus</span>' : ''}
              </div>
              ${unassignedRecips.length > 0 ? `
              <div style="display:flex;gap:8px;">
                <select id="add-recip-${sheet.id}-${c.id}"
                  style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Epilogue',sans-serif;font-size:13px;background:var(--surface);">
                  <option value="">+ Ajouter un destinataire filtre…</option>
                  ${unassignedRecips.map(r => `<option value="${r.id}">${r.name}</option>`).join('')}
                </select>
                <button class="btn btn-secondary btn-sm"
                  onclick="addRecipientToSheetClient('${sheet.id}','${c.id}')">Ajouter</button>
              </div>` : ''}
            </div>`;
          });
        }

        // Add client section
        html += `<div style="padding:14px 16px;">
          <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;">Ajouter un client expéditeur</div>
          ${unassigned.length > 0 ? `
          <div style="display:flex;gap:8px;">
            <select id="add-client-${sheet.id}"
              style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Epilogue',sans-serif;font-size:14px;background:var(--surface);">
              <option value="">— Choisir un client —</option>
              ${unassigned.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
            </select>
            <button class="btn btn-primary btn-sm" onclick="addClientToSheet('${sheet.id}')">Ajouter</button>
          </div>` : '<p style="font-size:13px;color:var(--ink2);">Tous les clients sont assignés à cette feuille.</p>'}
        </div>
        </div></div>`;
      });
    }
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="empty"><p>Erreur : ' + e.message + '</p></div>'; }
}

async function exportByRoute() {
  openModal('Export par feuille de route', `
    Cette action va :<br><br>
    • Générer <strong>un fichier Excel par feuille de route</strong><br>
    • Les clients non assignés seront exportés dans un fichier <strong>"Autres"</strong><br>
    • Remettre toutes les quantités à zéro<br>
    • Archiver les commandes dans l'historique<br><br>
    <strong>Cette action est irréversible. Confirmer ?</strong>
  `, [
    { label: 'Annuler', cls: 'btn-secondary', action: closeModal },
    { label: 'Exporter', cls: 'btn-success', action: async () => {
      closeModal();
      try {
        const data = await api('orders/export-by-route', { method: 'POST' });
        if (!data.sheets || data.sheets.length === 0) { toast('⚠️ Aucune commande à exporter'); return; }
        const sheetsWithData = data.sheets.filter(s => s.rows && s.rows.length > 0);
        if (sheetsWithData.length === 0) { toast('⚠️ Aucune commande à exporter'); return; }
        const dateStr = new Date().toLocaleDateString('fr-FR').replace(/\//g, '-');
        // Create one Excel workbook with one sheet per feuille de route
        const wb = XLSX.utils.book_new();
        sheetsWithData.forEach(sheet => {
          const csvRows = buildExportRows(sheet.rows);
          const ws = XLSX.utils.aoa_to_sheet(csvRows);
          // Auto column width
          const colWidths = csvRows[0].map((_, ci) => ({
            wch: Math.max(...csvRows.map(r => String(r[ci] || '').length), 10)
          }));
          ws['!cols'] = colWidths;
          // Sheet name max 31 chars (Excel limit), strip invalid chars
          const sheetName = sheet.name.replace(/[:\/?*\[\]]/g, '').substring(0, 31);
          XLSX.utils.book_append_sheet(wb, ws, sheetName);
        });
        XLSX.writeFile(wb, 'commandes_' + dateStr + '.xlsx');
        toast('✓ Export téléchargé (' + sheetsWithData.length + ' feuille' + (sheetsWithData.length > 1 ? 's' : '') + ') — commandes réinitialisées');
        renderAdminOrders();
      } catch(e) { toast('❌ ' + e.message); }
    }}
  ]);
}

function buildExportRows(rows) {
  const byClient = {};
  rows.forEach(o => {
    if (!byClient[o.client_name]) byClient[o.client_name] = { address: o.client_address || '', totalQty: 0, recipients: {} };
    byClient[o.client_name].totalQty += parseInt(o.quantity) || 0;
    byClient[o.client_name].recipients[o.recipient_name] = o.quantity;
  });
  const maxRecip = Math.max(...Object.values(byClient).map(c => Object.keys(c.recipients).length));
  const recipHeaders = Array.from({ length: maxRecip }, (_, i) => i === 0 ? 'Fournisseurs' : '');
  const csvRows = [['Client', 'Ville', 'Nb de passage', ...recipHeaders]];
  Object.entries(byClient).sort((a,b) => a[0].localeCompare(b[0])).forEach(([clientName, info]) => {
    const recipNames = Object.entries(info.recipients).sort((a,b) => a[0].localeCompare(b[0])).map(([name]) => name);
    while (recipNames.length < maxRecip) recipNames.push('');
    csvRows.push([clientName, info.address, info.totalQty, ...recipNames]);
  });
  return csvRows;
}

  const pwd = document.getElementById('cfg-pwd').value;
  if (!pwd || pwd.length < 4) { toast('⚠️ Mot de passe trop court (min 4 caractères)'); return; }
  try { await api('config', { method: 'POST', body: { admin_password: pwd } }); document.getElementById('cfg-pwd').value = ''; toast('✓ Mot de passe modifié'); }
  catch(e) { toast('❌ ' + e.message); }
}

// ── ADMIN TAB SWITCHER ────────────────────────────────────
function showAdminTab(tab) {
  activeAdminTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['orders','history','clients','routes','settings'][i] === tab);
  });
  ['orders','history','clients','routes','settings'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'orders') renderAdminOrders();
  else if (tab === 'history') renderAdminHistory();
  else if (tab === 'clients') renderAdminClients();
  else if (tab === 'routes') renderRouteSheets();
  else if (tab === 'settings') renderAdminSettings();
}

// ── HELPERS ───────────────────────────────────────────────
function esc(s) { return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function downloadCSV(rows, filename) {
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(';')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function openModal(title, bodyHtml, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  const footer = document.getElementById('modal-footer');
  footer.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + b.cls;
    btn.textContent = b.label;
    btn.onclick = b.action;
    footer.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
